<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2d5a27" />
    <meta name="description" content="نظام الصحة الذكي" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
    
    <title>نظام الصحة الذكي</title>
    
    <style>
        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f8f9f7 0%, #f1f3f0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2d5a27 0%, #8b7355 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .loading-logo svg {
            width: 40px;
            height: 40px;
        }
        
        .loading-text {
            color: #2d5a27;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .loading-subtext {
            color: #8b7355;
            font-size: 0.9rem;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(45, 90, 39, 0.1);
            border-top-color: #2d5a27;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem 0;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading screen -->
    <div id="loading">
        <div class="loading-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
        </div>
        <div class="loading-text">نظام الصحة الذكي</div>
        <div class="spinner"></div>
        <div class="loading-subtext">جاري تحميل التطبيق...</div>
    </div>

    <!-- No script fallback -->
    <noscript>
        <div style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            z-index: 10000;
        ">
            <div style="
                max-width: 500px;
                background: #f8f9f7;
                padding: 2rem;
                border-radius: 20px;
                border: 1px solid #e8f5e8;
            ">
                <h1 style="color: #2d5a27; margin-bottom: 1rem;">يجب تفعيل JavaScript</h1>
                <p style="color: #666; margin-bottom: 1.5rem;">يحتاج هذا التطبيق إلى JavaScript ليعمل بشكل صحيح.</p>
            </div>
        </div>
    </noscript>

    <!-- ⚠️ هذا هو العنصر المهم - تأكد من وجوده! -->
    <div id="root">
        التحميل...
    </div>

    <script type="module" src="/src/index.jsx"></script>
    
    <script>
        // Hide loading screen when React app loads (handled in index.jsx)
        // Fallback: hide after 3 seconds if React hasn't loaded
        setTimeout(function() {
            var loading = document.getElementById('loading');
            if (loading && loading.style.display !== 'none') {
                loading.style.opacity = '0';
                setTimeout(function() {
                    loading.style.display = 'none';
                }, 500);
            }
        }, 3000);
    </script>
</body>
</html>
